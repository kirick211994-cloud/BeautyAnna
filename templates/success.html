
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchung erfolgreich</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include "footer.html" %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4 text-center p-5">

                <h1 class="text-success display-3">✓</h1>

                <h2 class="mt-3">Vielen Dank!</h2>

                <p class="lead mt-3">
                    Ihre Buchung wurde erfolgreich gespeichert.
                </p>

                <hr>

                <p><strong>Name:</strong> {{ name }}</p>

                <p><strong>Dienstleistung:</strong> {{ service }}</p>

                <p><strong>Datum:</strong> {{ date }}</p>

                <p><strong>Uhrzeit:</strong> {{ time }}</p>

                <p><strong>Telefon:</strong> {{ phone }}</p>

                <a href="/" class="btn btn-success btn-lg mt-4">
                    Zur Startseite
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
