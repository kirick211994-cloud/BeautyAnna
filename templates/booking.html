
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termin buchen | Maniküre Anna</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
{% include "footer.html" %}
{% include "navbar.html" %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center text-pink mb-4">
                        Termin buchen
                    </h2>

                    <form action="/" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Vor- und Nachname</label>
                            <input type="text"
                                   class="form-control"
                                   name="name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefonnummer</label>
                            <input type="tel"
                                   class="form-control"
                                   name="phone"
                                   required>
                        </div>

                        <div class="mb-3">

                            <label class="form-label">Dienstleistung</label>

                            <select class="form-select" name="service" required>

                                <option>Maniküre</option>
                                <option>Maniküre mit Lack</option>
                                <option>Gel-Lack</option>
                                <option>Neumodellage</option>
                                <option>Auffüllen</option>
                                <option>Nagelreparatur</option>
                                <option>Japanische Maniküre</option>
                                <option>Pediküre</option>
                                <option>Pediküre mit Lack</option>
                                <option>Pediküre mit Gel-Lack</option>
                                <option>Japanische Pediküre</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Wunschtermin</label>

                            <input
                                 type="text"
                                 class="form-control"
                                 id="date"
                                 name="date"
                                 placeholder="Datum auswählen"
                                 required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Uhrzeit</label>

                            <select class="form-select" name="time" id="time" required>

    <option value="09:00">09:00</option>
    <option value="10:00">10:00</option>
    <option value="11:00">11:00</option>
    <option value="12:00">12:00</option>
    <option value="13:00">13:00</option>
    <option value="14:00">14:00</option>
    <option value="15:00">15:00</option>
    <option value="16:00">16:00</option>
    <option value="17:00">17:00</option>
    <option value="18:00">18:00</option>

</select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">Kommentar</label>

                            <textarea
                                class="form-control"
                                rows="4"
                                name="comment"></textarea>

                        </div>

                        <button class="btn btn-success btn-lg w-100">
                            Termin buchen
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/de.js"></script>
<script>

const today = new Date().toISOString().split("T")[0];

const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("time");

flatpickr("#date", {
    locale: flatpickr.l10ns.de,
    dateFormat: "Y-m-d",
    minDate: "today",

    enable: [
        function(date) {
            // Разрешить только понедельник-пятницу
            return date.getDay() >= 1 && date.getDay() <= 5;
        }
    ]
});

dateInput.addEventListener("change", function () {



    fetch("/get_busy_times?date=" + this.value)
        .then(response => response.json())
        .then(busyTimes => {

            for (let option of timeSelect.options) {
                option.disabled = false;
                option.text = option.value;
            }

            busyTimes.forEach(time => {

                for (let option of timeSelect.options) {

                    if (option.value === time) {
                        option.disabled = true;
                        option.text = option.value + " ❌ Belegt";
                    }

                }

            });

        });

});

</script>

</body>
</html>
