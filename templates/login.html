<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход администратора</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% include "footer.html" %}
{% include "navbar.html" %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Вход администратора
                    </h2>

                    <form method="POST">

                        <label class="form-label">Логин</label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>

                        <br>

                        <label class="form-label">Пароль</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                        <br>

                        <button
                            class="btn btn-primary w-100"
                            type="submit">

                            Войти

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
