<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <title>Galerie verwalten</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

{% include "navbar.html" %}

<div class="container py-5">

    <h1 class="mb-4">
        📸 Galerie verwalten
    </h1>

    <div class="card shadow p-4">

        <form action="/upload_photo"
              method="POST"
              enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Foto auswählen
                </label>

                <input
                    type="file"
                    class="form-control"
                    name="photo"
                    accept="image/*"
                    required>

            </div>

            <button class="btn btn-success">
                📤 Hochladen
            </button>

        </form>

    </div>

    <br>
<hr class="my-5">

<div class="row">

{% for photo in photos %}

<div class="col-md-3 mb-4">

    <div class="card shadow">

        <img src="{{ url_for('static', filename='gallery/' + photo) }}"
             class="card-img-top"
             style="height:220px; object-fit:cover;">

        <div class="card-body text-center">

            <strong>{{ photo }}</strong>

            <br><br>

            <a href="/delete_photo/{{ photo }}"
               class="btn btn-danger btn-sm">
                🗑 Удалить
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>
    <a href="/admin" class="btn btn-secondary">
        ← Zurück
    </a>

</div>

{% include "footer.html" %}

</body>
</html>
